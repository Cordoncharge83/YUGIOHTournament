# Optional legacy development tooling.
# Normal local development uses SQLite: DATABASE_URL=sqlite:///./data/app.db
# Use this file only when intentionally testing PostgreSQL compatibility.
services:
  db:
    image: postgres:16
    container_name: yugioh_tournament_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: yugioh_tournament
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
